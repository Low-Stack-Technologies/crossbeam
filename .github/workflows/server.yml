name: Server CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/server.yml"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: crossbeam
          POSTGRES_PASSWORD: password
          POSTGRES_DB: crossbeam
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crossbeam"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -p 9000:9000 \
            minio/minio:latest server /data
          timeout 30 sh -c 'until curl -sf http://localhost:9000/minio/health/live; do sleep 1; done'

      - name: Create MinIO buckets
        run: |
          docker run --rm --network host minio/mc:latest \
            sh -c "mc alias set local http://localhost:9000 minioadmin minioadmin && \
                   mc mb --ignore-existing local/crossbeam-test && \
                   mc mb --ignore-existing local/crossbeam-uploads"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build
        working-directory: server
        run: go build ./...

      - name: Vet
        working-directory: server
        run: go vet ./...

      - name: Test
        working-directory: server
        env:
          DATABASE_URL: postgres://crossbeam:password@localhost:5432/crossbeam
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: crossbeam-uploads
        run: go test -v -count=1 ./...
