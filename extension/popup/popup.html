<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crossbeam</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <header>
      <div class="header-left">
        <span id="conn-dot" class="conn-dot conn-dot--off" title="Disconnected"></span>
        <span id="device-name" class="device-name">Crossbeam</span>
      </div>
      <div class="header-actions">
        <button id="popout-btn" class="icon-btn" title="Open in window">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="chat-messages">
      <button id="load-more-btn" class="load-more-btn hidden">Load older messages</button>
      <div id="chat-empty" class="chat-empty hidden">No messages yet. Send something!</div>
    </div>

    <footer id="chat-footer">
      <!-- Link extras (shown when link mode active) -->
      <div id="link-extras" class="link-extras hidden">
        <input id="link-url" type="text" placeholder="https://..." />
        <input id="link-title" type="text" placeholder="Title (optional)" />
      </div>

      <!-- File chip (shown when file selected) -->
      <div id="file-chip" class="file-chip hidden">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        <span id="file-chip-name"></span>
        <button id="clear-file-btn" title="Remove file">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <div id="send-error" class="send-error hidden"></div>

      <div class="input-row">
        <button id="attach-btn" class="input-icon-btn" title="Attach file">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <button id="link-btn" class="input-icon-btn" title="Send link">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        </button>
        <textarea id="message-input" placeholder="Write a message..." rows="1"></textarea>
        <select id="target-device" title="Send to">
          <option value="">All</option>
        </select>
        <button id="send-btn" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>

      <input id="file-input" type="file" class="hidden" />
    </footer>

    <!-- Not logged in overlay -->
    <div id="auth-overlay" class="auth-overlay hidden">
      <p>Not connected.</p>
      <button id="go-settings-btn">Open Settings</button>
    </div>

  </div>

  <script src="../browser-polyfill.min.js"></script>
  <script src="../shared/constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
